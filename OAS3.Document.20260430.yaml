                      properties:
                        url_link:
                          type: string
                          description: 'A URL link that provides access to the Hosted Checkout Page.'
                        client_secret:
                          type: string
                          description: 'The client secret required to initiate the frontend script for rendering the Hosted Payment Page when the UI mode is set to "embedded" or "custom".'
                    url_setting:
                      type: object
                      description: ''
