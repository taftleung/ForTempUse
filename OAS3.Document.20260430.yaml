  /subscriptions/{id}/amendments:
    post:
      tags:
        - Subscription Amendments
      summary: Create an Amendment for a Subscription
      description: |
        Creates an Amendment for a Subscription. An amendment has its own life cycle, when the status changes to "completed", the latest recurring payment plan will be reflected in the original Subscription.
      parameters:
        - $ref: '#/components/parameters/amendment-x-hsbc-msg-encrypt-id'
        - $ref: '#/components/parameters/message_encrypt'
        - $ref: '#/components/parameters/subscription-id'
      requestBody:
        description: |
          ***The request body must be encrypted before sending. The unencrypted message shown below is merely for illustrative purposes.***
        content:
          application/json:
            schema:
              required:
                - description
                - recurring
              type: object
              properties:
                description:
                  type: string
                  minLength: 5
                  maxLength: 140
                  description: 'Description of this amendment.'
                recurring:
                  type: object
                  description: |
                    Recurring Payment Plan to be amended.
                    
                    Plan | Definition | Eligibility
                    ---|---|---
                    fixed | Recurring payments that have a fixed amount each time i.e. Spotify, Netflix, council rates. | • Australia AZ Payment Agreement<br>• United Arab Emirates GD Recurring Payment
                    variable | Recurring payments that have a variable amount each time i.e. ad-hoc wallet top-ups, Uber trips. | • Australia AZ Payment Agreement
                  oneOf:
                    - type: object
                      title: fixed
                      properties:
                        fixed:
                          type: object
                          description: |
                            Please check the eligibility of the input fields for each Subscription Model:
                            Subscription Model | amount | total_count | interval | end_date
                            ---|---|---|---|---
                            Australia AZ Payment Agreement | eligible | n/a | eligible | eligible
                            United Arab Emirates GD Recurring Payment | eligible | eligible | eligible | n/a
                          properties:
                            amount:
                              type: integer
                              pattern: ^[\d]{1,10}$
                              description: |
                                Fixed amount of each recurring payment.
                                - Input the amount as an integer without any punctuation. For example, if the amount is 19.45 in a currency that uses two decimal places, input it as 1945. If the currency does not use decimal places, enter the amount as is.
                                - Other specific rules, such as accepted amount ranges, may apply. Please refer to the [Market-Specific Features](#apidoccontentid-2596) section for details.
                            total_count:
                              type: integer
                              minimum: 1
                              maximum: 999
                              nullable: true
                              description: 'The total count of all recurring payments of one subscription.'
                            interval:
                              type: string
                              description: 'Payment Interval.'
                              enum:
                                - daily
                                - weekly
                                - monthly
                                - yearly
                            end_date:
                              type: integer
                              pattern: ^[\d]{1,10}$
                              description: 'End date of the recurring payment plan. Measured in seconds since the Unix epoch.'
                    - type: object
                      title: variable
                      properties:
                        variable:
                          type: object
                          description: ''
                          properties:
                            max_amount:
                              type: integer
                              pattern: ^[\d]{1,10}$
                              description: |
                                By setting up the Maximum Amount in Variable Recurring Payment Plan means each payment can be any amount but cannot exceed this maximum amount.
                                - Input the amount as an integer without any punctuation. For example, if the amount is 19.45 in a currency that uses two decimal places, input it as 1945. If the currency does not use decimal places, enter the amount as is.
                                - Other specific rules, such as accepted amount ranges, may apply. Please refer to the [Market-Specific Features](#apidoccontentid-2596) section for details.
                            interval:
                              type: string
                              description: 'Payment Interval.'
                              enum:
                                - adhoc
                                - daily
                                - weekly
                                - monthly
                                - yearly
                            end_date:
                              type: integer
                              pattern: ^[\d]{1,10}$
                              description: 'End date of the recurring payment plan. Measured in seconds since the Unix epoch.'
                metadata:
                    $ref: '#/components/schemas/Metadata'
            example:
              description: Adjustment of the payment amount due to an upgraded gym plan
              recurring:
                fixed:
                  amount: 50000
              metadata:
                any_key: any_value
        required: true
      responses:
        '200':
          $ref: '#/components/responses/amendment_200'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
        '599':
          $ref: '#/components/responses/599'
      security:
        - basicAuth: []
    get:
      tags:
        - Subscription Amendments
      summary: List all Subscription Amendments for a Subscription
      description: |
        List all Subscription Amendments for a Subscription.
      parameters:
        - $ref: '#/components/parameters/amendment-x-hsbc-msg-encrypt-id'
        - $ref: '#/components/parameters/message_encrypt'
        - $ref: '#/components/parameters/subscription-id'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: 'OK - Everything worked as expected.<br>***The response message needs to be decrypted in order to read the JSON object illustrated below.***'
          content:
            application/json:
              schema:
                type: object
                description: ''
                properties:
                  entity:
                    type: string
                    description: Entity Type.
                    enum:
                      - list
                  total_pages:
                    type: integer
                    description: Total number of pages of the result set
                  total_counts:
                    type: integer
                    description: Total number of records of the result set
                  counts:
                    type: integer
                    description: Number of records returned in the current page
                  payload:
                    type: array
                    items:
                      $ref: '#/components/schemas/Amendment'
              example:
                entity: list
                total_pages: 5
                total_counts: 5
                counts: 1
                payload:
                  - id: amendment-12345678
                    entity: amendment
                    created: 1675854446
                    status: completed
                    description: Adjustment of the payment amount due to an upgraded gym plan
                    recurring:
                      fixed:
                        amount: 50000
                    link:
                      rel: subscription
                      id: subscription-12345678
                    metadata:
                      any_key: any_value
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
        '599':
          $ref: '#/components/responses/599'
