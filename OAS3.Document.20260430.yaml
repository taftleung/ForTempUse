  /subscriptions:
    post:
      tags:
        - Subscriptions
      summary: Create a Subscription
      description:  |
        Create a subscription.
      parameters:
        - $ref: '#/components/parameters/subscription-x-hsbc-msg-encrypt-id'
        - $ref: '#/components/parameters/message_encrypt'
      requestBody:
        description: |
          ***The request body must be encrypted before sending. The unencrypted message shown below is merely for illustrative purposes.***
        content:
          application/json:
            schema:
              required:
                - id
                - description
                - currency
                - recurring
                - subscription_model
              type: object
              properties:
                id:
                  type: string
                  minLength: 5
                  maxLength: 30
                  pattern: ^[a-zA-Z0-9_-]+$
                  description: 'Subscription ID. Assigned by User.'
                description:
                  type: string
                  minLength: 5
                  maxLength: 140
                  description: 'Description of this subscription.'
                currency:
                  type: string
                  pattern: ^[a-z]{3}$
                  description: |
                    Three-letter ISO currency code, in lowercase.                  
                    - Supported currencies may vary among different locations and models. Please refer to the [Market-Specific Features](#apidoccontentid-2596) section for details.
                recurring:
                  type: object
                  description: |
                    Recurring Payment Plan.
                    
                    Plan | Definition | Eligibility
                    ---|---|---
                    fixed | Recurring payments that have a fixed amount each time i.e. Spotify, Netflix, council rates. | Please refer to the [Market-Specific Features](#apidoccontentid-2596) section to verify which markets and models support the Fixed Recurring Plan.
                    variable | Recurring payments that have a variable amount each time i.e. ad-hoc wallet top-ups, Uber trips. | Please refer to the [Market-Specific Features](#apidoccontentid-2596) section to verify which markets and models support the Variable Recurring Plan.
                  oneOf:
                    - type: object
                      title: fixed
                      properties:
                        fixed:
                          type: object
                          required:
                            - amount
                            - interval
                          description: |
                            Please check the mandatory of the input fields for each Subscription Model:
                            Subscription Model | amount | total_count | interval | start_date | end_date
                            ---|---|---|---|---|---
                            Australia AZ Payment Agreement | Required | n/a | Required | Required | Optional
                            Australia FS Recurring Payment | Required | Required | Required | n/a | n/a
                            Bangladesh SL Recurring Payment | Required | n/a | Required | Required | n/a
                            India RP Subscription | Required | Required | Required | Required | n/a
                            India HSBC UPI Mandate | Required | n/a | Required | Required | Required
                            Philippines RZ Recurring Payment | Required | n/a | Required | n/a | n/a
                            Singapore FS Recurring Payment | Required | Required | Required | n/a | n/a
                            United Arab Emirates GD Recurring Payment | Required | Required | Required | n/a | n/a
                            United States SP Subscription | Required | n/a | Required | n/a | Optional
                            
                          properties:
                            amount:
                              type: integer
                              pattern: ^[\d]{1,10}$
                              description: |
                                Fixed amount of each recurring payment.
                                - Input the amount as an integer without any punctuation. For example, if the amount is 19.45 in a currency that uses two decimal places, input it as 1945. If the currency does not use decimal places, enter the amount as is.
                                - Other specific rules, such as accepted amount ranges, may apply. Please refer to the [Market-Specific Features](#apidoccontentid-2596) section for details.
                            total_count:
                              type: integer
                              minimum: 1
                              maximum: 999
                              nullable: true
                              description: 'The total count of all recurring payments of one subscription.'
                            interval:
                              type: string
                              description: 'Payment Interval.'
                              enum:
                                - daily
                                - weekly
                                - monthly
                                - yearly
                            start_date:
                              type: integer
                              pattern: ^[\d]{1,10}$
                              nullable: true
                              description: 'Start date of the recurring payment plan. Measured in seconds since the Unix epoch.'
                            end_date:
                              type: integer
                              pattern: ^[\d]{1,10}$
                              nullable: true
                              description: 'End date of the recurring payment plan. Measured in seconds since the Unix epoch.'
                    - type: object
                      title: variable
                      properties:
                        variable:
                          type: object
                          required:
                            - interval
                          description: |
                            Please check the mandatory of the input fields for each Subscription Model:
                            Subscription Model | max_amount | initial_amount | interval | start_date | end_date
                            ---|---|---|---|---|---
                            Australia AZ Payment Agreement | Optional | n/a | Required | Required | Optional
                            Philippines RZ Recurring Payment | n/a| Required | Required | n/a | n/a
                            United Arab Emirates GD Recurring Payment | n/a| Required | Required | n/a | n/a
                          properties:
                            max_amount:
                              type: integer
                              pattern: ^[\d]{1,10}$
                              description: |
                                By setting up the Maximum Amount in Variable Recurring Payment Plan means each payment can be any amount but cannot exceed this maximum amount.
                                - Input the amount as an integer without any punctuation. For example, if the amount is 19.45 in a currency that uses two decimal places, input it as 1945. If the currency does not use decimal places, enter the amount as is.
                                - Other specific rules, such as accepted amount ranges, may apply. Please refer to the [Market-Specific Features](#apidoccontentid-2596) section for details.
                            initial_amount:
                              type: integer
                              pattern: ^[\d]{1,10}$
                              description: |
