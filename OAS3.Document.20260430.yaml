                                  description: "Customer's email address."
                                phone:
                                  type: string
                                  pattern: ^\d+\|\d+$
                                  maxLength: 20
                                  description: "The customer's phone number in `CountryCallingCode`|`Number` format. Example: `1|123456789`."
                    - type: object
                      title: hk_hsbc_payme
                      properties:
