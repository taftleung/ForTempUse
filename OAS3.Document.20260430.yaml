                    in_rp_subscription | India RP Subscription
                    ph_rz_recurring | Philippines RZ Recurring Payment
                    sg_fs_recurring | Singapore FS Recurring Payment
                    ae_gd_recurring | United Arab Emirates GD Recurring Payment
                    us_sp_subscription | United States SP Subscription
                    
                  oneOf:
                    - type: object
                      title: au_az_payment_agreement
                      properties:
                        au_az_payment_agreement:
                          required:
                            - url_setting
                            - payer_details
                          type: object
                          description: ''
                          properties:
                            url_setting:
                              required:
                                - webhook
                              type: object
                              description: 'Important Reminder: Ensure all values in the URL are properly URL-encoded.'
                              properties:
                                webhook:
                                  type: string
                                  maxLength: 255
                                  description: 'An internet-accessible URL capable of receiving payloads upon the occurrence of webhook events.<br>**Please see [Webhooks](#/Webhooks) for details.*'
                            payer_details:
                              type: object
                              required:
                                - name
