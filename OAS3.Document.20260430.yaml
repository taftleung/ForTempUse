        metadata:
            $ref: '#/components/schemas/Metadata'
    Subscription:
      type: object
      properties:
        id:
          type: string
          minLength: 5
          maxLength: 30
          pattern: ^[a-zA-Z0-9_-]+$
          description: '*Input by User*<br>Subscription ID. Assigned by User.'
        entity:
          type: string
          description: 'Entity type.'
          enum: 
            - subscription
        created:
          type: integer
          description: 'Time at which the entity is created. Measured in seconds since the Unix epoch.'
        status:
          type: string
          description: |
            The status of the subscription
          enum:
            - created
            - authenticated
            - active
            - pending
            - suspended
            - cancelled
            - expired
            - completed
            - failed
        fail_reason:
          type: string
          nullable: true
          description: 'If the status of a subscription is failed, a text message is returned by the system to state the reason.'
        payment_intent:
          type: boolean
          description: 'True if any payment request is submitted, regardless of whether it is successful or fails.'
        description:
          type: string
          minLength: 5
          maxLength: 140
          description: '*Input by User*<br>Description of this subscription.'
        currency:
          type: string
          pattern: ^[a-z]{3}$
          description: '*Input by User*<br>Three-letter ISO currency code, in lowercase.'
        recurring:
          type: object
          description: |
            *Input by User*<br>Recurring Payment Plan.
            
            Plan | Definition | Eligibility
            ---|---|---
            fixed | Recurring payments that have a fixed amount each time i.e. Spotify, Netflix, council rates. | Please refer to the [Market-Specific Features](#apidoccontentid-2596) section to verify which markets and models support the Fixed Recurring Plan.
            variable | Recurring payments that have a variable amount each time i.e. ad-hoc wallet top-ups, Uber trips. | Please refer to the [Market-Specific Features](#apidoccontentid-2596) section to verify which markets and models support the Variable Recurring Plan.
          oneOf:
            - type: object
              title: fixed
              properties:
                fixed:
                  type: object
                  description: ''
                  properties:
                    amount:
                      type: integer
                      pattern: ^[\d]{1,10}$
                      description: |
                        *Input by User*<br>Fixed amount of each recurring payment.
                    total_count:
                      type: integer
                      minimum: 1
                      maximum: 999
                      nullable: true
                      description: '*Input by User*<br>The total count of all recurring payments of one subscription.'
                    remaining_count:
                      type: integer
                      nullable: true
                      description: 'The remaining count of all reucrring payments of one subscription. Calculated by system.'
                    interval:
                      type: string
                      description: '*Input by User*<br>Payment Interval.'
                      enum:
                        - daily
                        - weekly
                        - monthly
                        - yearly
                    start_date:
                      type: integer
                      pattern: ^[\d]{1,10}$
                      nullable: true
                      description: '*Input by User*<br>Start date of the recurring payment plan. Measured in seconds since the Unix epoch.'
                    next_charge_date:
                      type: integer
                      nullable: true
                      description: 'The date of which the next reucrring payment is triggered. Calculated by system. Measured in seconds since the Unix epoch.'
                    end_date:
                      type: integer
                      pattern: ^[\d]{1,10}$
                      nullable: true
                      description: '*Input by User*<br>End date of the recurring payment plan. Measured in seconds since the Unix epoch.'
            - type: object
              title: variable
              properties:
                variable:
                  type: object
                  description: ''
                  properties:
                    max_amount:
                      type: integer
                      pattern: ^[\d]{1,10}$
                      description: |
                        *Input by User*<br>By setting up the Maximum Amount in Variable Recurring Payment Plan means each payment can be any amount but cannot exceed this maximum amount.
                    initial_amount:
                      type: integer
                      pattern: ^[\d]{1,10}$
                      description: |
                        *Input by User*<br>The initial payment amount in the recurring payment sequence.
                    interval:
                      type: string
                      description: '*Input by User*<br>Payment Interval.'
                      enum:
                        - adhoc
                        - daily
                        - weekly
                        - monthly
                        - yearly
                    start_date:
                      type: integer
                      pattern: ^[\d]{1,10}$
                      description: '*Input by User*<br>Start date of the recurring payment plan. Measured in seconds since the Unix epoch.'
                    end_date:
                      type: integer
                      pattern: ^[\d]{1,10}$
                      description: '*Input by User*<br>End date of the recurring payment plan. Measured in seconds since the Unix epoch.'
        subscription_model:
          type: object
          description: |
            *Input by User*<br>Subscription Model.
            
            Model | Definition
            ---|---
            au_az_payment_agreement | Australia AZ Payment Agreement
            au_fs_recurring | Australia FS Recurring Payment
            bd_sl_recurring | Bangladesh SL Recurring Payment
            in_hsbc_upi_mandate | India HSBC UPI Mandate
            in_rp_subscription | India RP Subscription
            ph_rz_recurring | Philippines RZ Recurring Payment
            sg_fs_recurring | Singapore FS Recurring Payment
            ae_gd_recurring | United Arab Emirates GD Recurring Payment
            us_sp_subscription | United States SP Subscription
            
          oneOf:
            - type: object
              title: au_az_payment_agreement
              properties:
                au_az_payment_agreement:
                  type: object
                  description: ''
                  properties:
                    url_setting:
                      type: object
                      properties:
                        webhook:
                          type: string
                          maxLength: 255
                          description: '*Input by User*<br>An internet-accessible URL capable of receiving payloads upon the occurrence of webhook events.<br>**Please see [Webhooks](#/Webhooks) for details.*'
                    payer_details:
                      type: object
                      description: |
                        *Input by User*<br>Please select one of the Addressing Schemes: PayID or Bank Account.
                      properties:
                        name:
                          type: string
                          minLength: 1
                          maxLength: 100
                          description: "*Input by User*<br>The payer's name."
                        type:
                          type: string
                          description: '*Input by User*<br>Whether the payer is a person or organisation.'
                          enum:
                            - person
                            - organisation
                      oneOf:
                        - type: object
                          title: payer_payid
                          properties:
                            payer_payid:
                              type: object
                              properties:
                                payid:
                                  type: string
                                  minLength: 5
                                  maxLength: 50
                                  description: |
                                    *Input by User*<br>The payer's PayID.<br>Valid examples are:
                                      * +61-432123321 (mobile)
                                      * +61-312344321 (landline)
                                      * 0432123321 (mobile)
                                      * 0312344321 (landline)
                                      * jane.smith@example.com
                                payid_type:
                                  type: string
                                  maxLength: 50
                                  description: |
                                    *Input by User*<br>PayID Type. Valid values are:
                                    * ```phone``` Can be a mobile phone number or landline with area code
                                    * ```email``` Email address
                                    * ```abn``` Australian Business Number
                                    * ```org``` Organisation Name
                                  enum:
                                    - phone
                                    - email
                                    - abn
                                    - org
                        - type: object
                          title: payer_bank_account
                          properties:              
                            payer_bank_account:
                              type: object
                              properties:
                                bsb:
                                  type: string
                                  maxLength: 6
                                  description: '*Input by User*<br>The BSB (Bank-State-Branch) bank code.'
                                account_number:
                                  type: string
                                  minLength: 5
                                  maxLength: 9
                                  description: '*Input by User*<br>The bank account number (without the BSB).'
            - type: object
              title: au_fs_recurring
              properties:
                au_fs_recurring:
                  type: object
                  description: ''
                  properties:
                    access_method:
                      type: object
                      description: ''
                      properties:
                        html_form:
                          type: string
                          description: 'A HTML Form with all parameters which allows you to access the Hosted Authorization Page.'
                    url_setting:
                      type: object
                      description: ''
                      properties:
                        return_success_page:
                          type: string
                          maxLength: 255
                          description: '*Input by User*<br>A URL location to which the authorization process will return after it has been successfully completed.'
                        return_fail_page:
                          type: string
                          maxLength: 255
                          description: '*Input by User*<br>A URL location to which the authorization process will return in case of failure.'
                        webhook:
                          type: string
                          maxLength: 255
                          description: '*Input by User*<br>An internet-accessible URL capable of receiving payloads upon the occurrence of webhook events.<br>**Please see [Webhooks](#/Webhooks) for details.*'
                    page_setting:
                      type: object
                      description: ''
                      properties:
                        payment_option:
                          type: string
                          description: '*Input by User*<br>Merchants can define which payment option will be exclusively displayed on the Hosted Page.'
                          enum:
                            - amex
                            - diners
                            - mastercard
                            - unionpay
                            - visa
            - type: object
              title: bd_sl_recurring
              properties:
                bd_sl_recurring:
                  type: object
                  description: ''
                  properties:
                    access_method:
                      type: object
                      description: ''
                      properties:
                        url_link:
                          type: string
                          description: 'A URL link that provides access to the Hosted Authorization Page.'
                    refer_id:
                        type: string
                        maxLength: 50
                        description: |
                          *Input by User*<br>The Refer ID references the recurring payment method set up in the payment gateway's Admin Panel, which is a prerequisite for creating a subscription.
                    url_setting:
                      type: object
                      description: ''
                      properties:
                        return_success_page:
                          type: string
                          maxLength: 255
                          description: '*Input by User*<br>A URL location to which the authorization process will return after it has been successfully completed.'
                        return_fail_page:
                          type: string
                          maxLength: 255
                          description: '*Input by User*<br>A URL location to which the authorization process will return in case of failure.'
                        webhook:
                          type: string
                          maxLength: 255
                          description: '*Input by User*<br>An internet-accessible URL capable of receiving payloads upon the occurrence of webhook events.<br>**Please see [Webhooks](#/Webhooks) for details.*'
            - type: object
              title: in_hsbc_upi_mandate
              properties:
                in_hsbc_upi_mandate:
                  type: object
                  description: ''
                  properties:
                    url_setting:
                      type: object
                      properties:
                        webhook:
                          type: string
                          maxLength: 255
                          description: '*Input by User*<br>An internet-accessible URL capable of receiving payloads upon the occurrence of webhook events.<br>**Please see [Webhooks](#/Webhooks) for details.*'
                    expiry:
                      type: integer
                      pattern: ^[\d]{1,10}$
                      description: '*Input by User*<br>The Unix timestamp that indicates till when the customer can make the authorisation payment.'
                    payer_details:
                      type: object
                      description: ''
                      properties:
                        name:
                          type: string
                          maxLength: 100
                          description: "*Input by User*<br>The payer's name."
                        payer_vpa:
                          type: string
                          maxLength: 100
                          description: "*Input by User*<br>A Payer's VPA (Virtual Payment Address) is a unique identifier created by the payer for initiating payments through India's UPI system."
            - type: object
              title: in_rp_subscription
              properties:
                in_rp_subscription:
                  type: object
                  description: ''
                  properties:
                    access_method:
                      type: object
                      description: ''
                      properties:
                        url_link:
                          type: string
