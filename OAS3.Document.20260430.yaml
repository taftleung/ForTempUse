        subscription.active | When the first recurring payment for a subscription is successfully processed, or when a suspended subscription is resumed.
        subscription.pending | When an automatic payment attempt for a subscription fails. The system will continue to retry the payment while in this state.
        subscription.cancelled | When a subscription is cancelled. A cancelled subscription cannot be resumed.
        subscription.suspended | When a subscription is suspended.
        subscription.failed | When the authentication for a subscription fails.
        subscription.expired | When a subscription expires because the required authentication was not completed by the expiry date. The subscription cannot be used again.
        subscription.completed | When a subscription reaches its end date and completes its life cycle.
        
