                                        type:
                                          type: string
                                          description: 'Type of card tokenization'
                                          enum:
                                            - system_assigned_token
                                        token:
                                          type: string
                                          maxLength: 50
                                          description: 'A unique string token assigned by the Payment Gateway.'
                            customer:
                              required:
                              - first_name
                              - last_name
                              - email
                              - phone
                              - billing
                              - shipping
                              type: object
                              description: "Customer's Details."
                              properties:
                                first_name:
                                  type: string
