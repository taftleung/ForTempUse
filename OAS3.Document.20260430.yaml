                            postal_code:
                              type: string
                              maxLength: 16
                              description: "*Input by User*<br>The ZIP or other postal code of the customer's billing address."
                            country:
                              type: string
                              maxLength: 3
                              description: "*Input by User*<br>The country of the customer's billing address. ISO 3166-1 numeric three-digit country code. For example, US = 840."
            - type: object
              title: uk_gp_open_banking
