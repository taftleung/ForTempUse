  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    Order:
      type: object
      properties:
        id:
          type: string
          minLength: 5
          maxLength: 30
          pattern: ^[a-zA-Z0-9_-]+$
          description: '*Input by User*<br>Order ID. Assigned by User.'
        entity:
          type: string
          description: 'Entity type.'
          enum: 
            - order
        created:
          type: integer
          description: 'Time at which the entity is created. Measured in seconds since the Unix epoch.'
        amount:
          type: integer
          pattern: ^[\d]{1,10}$
          description: |
            *Input by User*<br>Order amount.
        currency:
          type: string
          pattern: ^[a-z]{3}$
          description: '*Input by User*<br>Three-letter ISO currency code, in lowercase.'
        status:
          type: string
          description: |
            The status of the Order
            
            Status | Definition
            ---|---
            created | A checkout session has been successfully created and is ready to be paid for.
            pending | The payment request for this checkout session has been successfully processed and is now awaiting further action, typically by the customer. This scenario is common in an asynchronous payment model. No further payment requests can be made for this order.
            paid | The payment for this checkout session has been successfully processed. No more payments can be made for this order.
            authorized | An Authorization has been successfully created under this order, reserving funds on the customer's payment method. The next step is to either capture or release the authorized amount. No further actions, such as additional payment or authorization requests, can be made for this order.
            closed | The payment for this checkout session has either failed or was not made within a specified period of time. If an Authorization under this order fails, the order will also transition to the ```closed``` status. No further actions, such as additional payment or authorization requests, can be made for this order.
            
          enum: [created, pending, paid, authorized, closed]
        description:
          type: string
          minLength: 5
          maxLength: 140
          description: '*Input by User*<br>Description of this Order.'
        checkout_model:
          type: object
          description: |
            *Input by User*<br>Checkout Model.
            
            Model | Definition
            ---|---
            au_fs_hosted_checkout | Australia FS Hosted Checkout
            bd_sl_hosted_checkout | Bangladesh SL Hosted Checkout
            hk_hsbc_payme | Hong Kong HSBC PayMe
            id_jk_direct_va_checkout | Indonesia JK Direct VA Checkout
            id_jk_hosted_checkout | Indonesia JK Hosted Checkout
            in_hsbc_upi_checkout | India HSBC UPI Checkout
            in_pu_hosted_checkout | India PU Hosted Checkout
            in_rp_overlay_hosted_checkout | India RP Overlay Hosted Checkout
            in_rp_redirect_hosted_checkout | India RP Redirect Hosted Checkout
            jp_sn_hosted_checkout | Japan SN Hosted Checkout
            jp_sn_direct_checkout | Japan SN Direct Checkout
            kr_fs_hosted_checkout | Korea FS Hosted Checkout
            my_eg_hosted_checkout | Malaysia EG Hosted Checkout
            ph_rz_hosted_checkout | Philippines RZ Hosted Checkout
            sg_fs_hosted_checkout | Singapore FS Hosted Checkout
            th_cp_hosted_checkout | Thailand CP Hosted Checkout
            ae_gd_hosted_checkout | United Arab Emirates GD Hosted Checkout
            uk_gp_direct_checkout | United Kingdom GP Direct Checkout
            uk_gp_hosted_checkout | United Kingdom GP Hosted Checkout
            uk_gp_open_banking | United Kingdom GP Open Banking
            uk_hsbc_open_banking | United Kingdom HSBC Open Banking
            us_sp_hosted_checkout | United States SP Hosted Checkout
            us_sp_in_person_checkout | United States SP In-Person Checkout
            vn_py_hosted_checkout | Vietnam PY Hosted Checkout
            
          oneOf:
            - type: object
              title: au_fs_hosted_checkout
              properties:
                au_fs_hosted_checkout:
                  type: object
                  description: ''
                  properties:
                    access_method:
                      type: object
                      description: ''
                      properties:
                        html_form:
                          type: string
                          description: 'A HTML Form containing all necessary parameters, enabling access to the Hosted Checkout Page.'
                    url_setting:
                      type: object
                      description: ''
                      properties:
                        return_success_page:
                          type: string
                          maxLength: 255
                          description: '*Input by User*<br>A URL location to which the checkout process will redirect after successful completion.'
                        return_fail_page:
                          type: string
                          maxLength: 255
                          description: '*Input by User*<br>A URL location to which the checkout process will redirect if it fails.'  
                        webhook:
                          type: string
                          maxLength: 255
                          description: '*Input by User*<br>An internet-accessible URL capable of receiving payloads upon the occurrence of webhook events.<br>**Please see [Webhooks](#/Webhooks) for details.*'
                    page_setting:
                      type: object
                      description: ''
                      properties:
                        payment_option:
                          type: string
                          description: '*Input by User*<br>Merchants can define which payment option will be exclusively displayed on the Hosted Page.'
                          enum:
                            - visa
                            - mastercard
                            - amex
                            - diners
                            - unionpay
                    payment_method_setting:
                      type: object
                      description: ''
                      properties:
                        card:
                          type: object
                          description: ''
                          properties:
                            tokenization:
                              type: object
                              description: |
                                *Input by User*
                                
                                Card details can be tokenized. Here is the supported type of tokenization:
                                
