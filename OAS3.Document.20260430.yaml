    Amendment:
      type: object
      properties:
        id:
          type: string
          description: 'Amendment ID.'
        entity:
          type: string
          description: 'Entity type.'
          enum: 
            - amendment
        created:
          type: integer
          description: 'Time at which the entity is created. Measured in seconds since the Unix epoch.'
        status:
          type: string
          description: |
            The status of the amendment
          enum:
            - pending
            - completed
            - declined
            - recalled
            - timedout
        description:
          type: string
          minLength: 5
          maxLength: 140
          description: '*Input by User*<br>Description of this amendment.'
        recurring:
          type: object
          description: |
            *Input by User*<br>Recurring Payment Plan to be amended.
            
            Plan | Definition | Eligibility
            ---|---|---
            fixed | Recurring payments that have a fixed amount each time i.e. Spotify, Netflix, council rates. | • Australia AZ Payment Agreement<br>• United Arab Emirates GD Recurring Payment
            variable | Recurring payments that have a variable amount each time i.e. ad-hoc wallet top-ups, Uber trips. | • Australia AZ Payment Agreement
          oneOf:
            - type: object
              title: fixed
              properties:
                fixed:
                  type: object
                  description: ''
                  properties:
                    amount:
                      type: integer
                      pattern: ^[\d]{1,10}$
                      description: |
                        *Input by User*<br>Fixed amount of each recurring payment.
                    total_count:
                      type: integer
                      minimum: 1
                      maximum: 999
                      nullable: true
                      description: '*Input by User*<br>The total count of all recurring payments of one subscription.'
                    interval:
                      type: string
                      description: '*Input by User*<br>Payment Interval.'
                      enum:
                        - daily
                        - weekly
                        - monthly
                        - yearly
                    end_date:
                      type: integer
                      pattern: ^[\d]{1,10}$
                      description: '*Input by User*<br>End date of the recurring payment plan. Measured in seconds since the Unix epoch.'
            - type: object
              title: variable
              properties:          
                variable:
                  type: object
                  description: ''
                  properties:
                    max_amount:
                      type: integer
                      pattern: ^[\d]{1,10}$
                      description: |
                        *Input by User*<br>By setting up the Maximum Amount in Variable Recurring Payment Plan means each payment can be any amount but cannot exceed this maximum amount.
                    interval:
                      type: string
                      description: '*Input by User*<br>Payment Interval.'
                      enum:
                        - adhoc
                        - daily
                        - weekly
                        - monthly
                        - yearly
                    end_date:
                      type: integer
                      pattern: ^[\d]{1,10}$
                      description: '*Input by User*<br>End date of the recurring payment plan. Measured in seconds since the Unix epoch.'
        link:
          type: object
          description: 'Link to the related resource'
          properties:
            rel:
              type: string
              description: 'The related entity name of this entity'
              enum:
                - subscription
            id:
              type: string
              description: 'The ID of the related entity'
        metadata:
            $ref: '#/components/schemas/Metadata'
    Authorization:
      type: object
      properties:
        id:
          type: string
          description: 'Authorization ID. Assigned by System.'
        entity:
          type: string
          description: 'Entity type.'
          enum: 
            - authorization
        created:
          type: integer
          description: 'Time at which the entity is created. Measured in seconds since the Unix epoch.'
        amount:
          type: integer
          description: 'Total amount authorized.'
        amount_received:
          type: integer
          description: 'Total amount that this Authorization has successfully collected.'
        currency:
          type: string
          description: 'Three-letter ISO currency code, in lowercase.'
        number_of_captures:
          type: integer
          description: 'Number of captures performed on this Authorization.'
        status:
          type: string
          description: |
            The status of the Authorization.
            
            Status | Definition
            ---|---
            created | The Authorization has been successfully created and is ready for capture.
            failed | The Authorization attempt failed. Details about the failure will be available in the ```fail_reason``` field.
            closed | i. The entire authorized amount has been successfully captured.<br>ii. The Authorization is now closed, and no further captures are allowed.
            expired | The Authorization expired without the full authorized amount being captured.
            cancelled | The Authorization was explicitly canceled before any captures occurred.
          enum:
            - created
            - failed
            - closed
            - expired
            - cancelled
        fail_reason:
          type: string
          nullable: true
          description: 'Reason for failure, if any.'
        expiry:
          type: integer
          pattern: ^[\d]{1,10}$
          description: 'The Unix timestamp indicating the deadline by which the merchant can capture the authorized payment.'
        payment_method:
          $ref: '#/components/schemas/PaymentMethod'
        link:
          type: object
          description: 'Link to the related resource'
          properties:
            rel:
              type: string
              description: 'The related entity name of this entity'
              enum:
                - order
            id:
              type: string
              description: 'The ID of the related entity'
        metadata:
            $ref: '#/components/schemas/Metadata'
    Payment:
      type: object
      properties:
        id:
          type: string
          description: 'Payment ID. Assigned by System.'
        entity:
          type: string
          description: 'Entity type.'
          enum: 
            - payment
        created:
          type: integer
          description: 'Time at which the entity is created. Measured in seconds since the Unix epoch.'
        amount:
          type: integer
          description: 'Payment amount.'
        currency:
          type: string
          description: 'Three-letter ISO currency code, in lowercase.'
        status:
          type: string
          description: |
            The status of the Payment.
            
            Status | Definition
            ---|---
            pending | The payment request has been successfully processed and is now awaiting further action, typically by the customer. This scenario is common in an asynchronous payment model.
            captured | The payment transaction has been successfully captured.
            paid | This status is only applicable for payments initiated by QR Code Checkout and is equivalent to the 'captured' status.
            failed | The payment request has failed. The specific reason for the failure will be disclosed in the ```fail_reason``` field.
            cancelled | The payment request has been cancelled.
            settled | The payment transaction has been settled. The corresponding transaction details will be disclosed in the Settlement Report prepared by HSBC.
            
          enum:
            - pending
            - captured
            - paid
            - failed
            - cancelled
            - settled
        refund_intent:
          type: boolean
          description: 'True if any refund request is submitted no matter it is successful or failed.'
        fail_reason:
          type: string
          nullable: true
          description: "The system returns a text message explaining the reason if a payment's status is ```failed```."
        payment_method:
          $ref: '#/components/schemas/PaymentMethod'
        link:
          type: object
          description: 'Link to the related resource'
          properties:
            rel:
              type: string
              description: 'The related entity name of this entity'
              enum: [authorization, order, payid, qr_code, subscription]
            id:
              type: string
              description: 'The ID of the related entity'
        links:
          type: array
          description: |
            Provides references to related resources. Supports linking with multiple entities.  
            *Note: This object is returned for the Pre-Authorized Payment model only at this moment. When this object is returned, `link` will be set to `null`.*
          items:
            type: object
            properties:
              rel:
                type: string
                description: 'The related entity name of this entity.'
                enum: [authorization, order, payid, qr_code, subscription]
              id:
                type: string
                description: 'The unique identifier of the related entity.'
        metadata:
          $ref: '#/components/schemas/Metadata'
    PaymentMethod:
      type: object
      description: 'The payment method that is used in the payment transaction. Only one payment method is returned at a time.<br><br>**The supported payment methods may vary depending on the location and model. For more details, please see the [Market-Specific Features](#apidoccontentid-2596) section.*'
      properties:
        type:
          type: string
          description: 'This refers to the type of Payment Method. An additional hash, with a name matching this value, is included in the Payment Method. This hash contains additional information that is specific to the type of Payment Method.<br><br>**Please note that both the ```card``` and ```card.wallet``` payment method types will return the same ```card``` object.*'
          enum:
            - apm
            - card
            - card.wallet
            - duitnow
            - faster_payments
            - hk_fps
            - other
            - payid
            - paynow
            - payto
            - promptpay
            - qris
            - upi
            - vietqr
            - wallet
      oneOf:
      - type: object
        title: apm
        properties:
          apm:
            type: object
            description: 'Alternative Payment Method.'
            properties:
              type:
                type: string
                description: |
                  The type of the Alternative Payment Method.
                  
                  Location | Possible Value
                  ---|---
                  Bangladesh | internet_banking<br>mobile_banking
                  India | internet_banking
                  Indonesia | direct_debit<br>digital_banking<br>e_money<br>online_to_offline<br>pay_later<br>virtual_account
                  Japan | japan_payment_code
                  Korea | bank_account<br>mobile_banking<br>virtual_account
                  Malaysia | internet_banking
                  Philippines | internet_banking<br>over_the_counter
                  Thailand | atm<br>bank_counter<br>internet_banking<br>kiosk<br>mobile_banking<br>over_the_counter<br>web_pay
                  Vietnam | pay_at_store<br>pay_on_delivery<br>pay_transfer
                  United Arab Emirates | bnpl
                  United States | direct_debit<br>pay_later
                  
              provider:
                type: string
                nullable: true
                description: 'The provider of the alternative payment method.'
              provider_status:
                type: string
                nullable: true
                description: 'The status returned by the alternative payment method provider.'
              metadata:
                type: object
                additionalProperties: true
                description: 'Should the service provider return any supplementary free-form object data, it will be encapsulated within this metadata. This data is read-only and is not subject to alterations or modifications.'
      - type: object
        title: card
        properties:
          card:
            type: object
            description: 'Card payments are supported through many networks and card brands.'
            properties:
              name:
                type: string
                nullable: true
                description: "Card Holder's Name."
              scheme:
                type: string
                description: 'Card Scheme.'
                enum:
                - amex
                - diners
                - discover
                - jcb
                - maestro
                - mastercard
                - unionpay
                - visa
                - rupay
                - unknown
              issuer:
                type: string
                nullable: true
                description: 'Card Issuer.'
              authorization_code:
                type: string
                nullable: true
                description: "The credit card authorization code is a five or six-digit number issued by the buyer's bank, used to confirm the validity of a credit card when a sale of a good or service is approved."
              mcn:
                type: string
                nullable: true
                description: 'Masked card number.'
              cvv_check:
                type: string
                nullable: true
                description: 'The result of the CVV check.'
                enum:
                  - matched
                  - not_matched
                  - not_checked
                  - not_processed
              eci_value:
                type: string
                nullable: true
                description: 'The result of the 3DS authentication.'
              wallet:
                type: string
                nullable: true
                description: 'If this Card is part of a card wallet, this contains the type of the card wallet.'
                enum:
                  - amex_express_checkout
                  - apple_pay
                  - google_pay
                  - masterpass
                  - samsung_pay
                  - visa_checkout
              dcc:
                type: object
                nullable: true
                description: 'Dynamic currency conversion.'
                properties:
                  amount:
                    type: integer
                    nullable: true
                    description: 'The converted amount to offer the cardholder.'
                  currency:
                    type: string
                    nullable: true
                    description: 'Currency chosen by the cardholder.'
                  exchange_rate_source:
                    type: string
                    nullable: true
                    description: 'Source of the exchange rate.'
                  rate:
                    type: number
                    nullable: true
                    format: double
                    description: 'The exchange rate offered by the Currency Conversion Processor for this transaction. Inclusive of the margin from the DCC provider which is provided in the Margin Percentage field.'
                  margin_percentage:
                    type: number
                    nullable: true
                    format: double
                    description: 'Margin Percentage. The foreign exchange markup in relation to the ECB Daily Rate.'
              tokenization:
                type: object
                nullable: true
                description: 'Card Tokenization.'
                properties:
                  type:
                    type: string
                    description: 'Type of card tokenization.'
                    enum:
                      - merchant_assigned_token
                      - system_assigned_token
                  token:
                    type: string
                    description: 'This token is linked to the specific card details.'
              installment:
                type: object
                nullable: true
                description: |
                  Plan | Definition
                  ---|---
                  select_plan_in_payment_page | The Installment Plan is selected on the Payment Page. Details of the plan are returned in the payment callbacks.
                  create_new_plan | The details of the Installment Plan are created during the API request.
                  
                oneOf:
                - type: object
                  title: select_plan_in_payment_page
                  properties:
                    select_plan_in_payment_page:
                      type: object
                      properties:
                        count:
                          type: integer
                          description: 'Count of the installment.'
                        interval:
                          type: string
                          description: 'Interval of each installment'
                          enum:
                            - weekly
                            - biweekly
                            - monthly
                        interest_rate:
                          type: number
                          format: double
                          description: 'Interest Rate.'
                - type: object
                  title: create_new_plan
                  properties:
                    create_new_plan:
                      type: object
                      properties:
                        count:
                          type: integer
                          description: 'Count of the installment.'
                        interval:
                          type: string
                          description: 'Interval of each installment'
                          enum:
                            - monthly
      - type: object
        title: duitnow
        properties:
          duitnow:
            type: object
            description: 'DuitNow is a real-time online fund transfer service in Malaysia, allowing users to send and receive money instantly using just mobile numbers or National Registration Identity Card (NRIC) numbers.'
      - type: object
        title: faster_payments
        properties:
          faster_payments:
            type: object
            description: 'Faster Payments is a real-time payment system in the UK that allows funds to be received almost instantly.'
            properties:
              account_name:
                type: string
                description: 'The name of the destination account.'
              sort_code:
                type: string
                description: 'The sort code of the destination account.'
              account_number:
                type: string
                description: 'The number of the destination account. The first four digits are masked for security reason.'
      - type: object
        title: hk_fps
        properties:
          hk_fps:
            type: object
            description: 'The FPS (Faster Payment System) in Hong Kong is a real-time, round-the-clock interbank transfer service that enables instant payments in HKD or RMB through various digital channels.'
            properties:
              supplementary_info:
                type: string
                description: 'Supplementary information.'
      - type: object
        title: other
        properties:
          other:
            type: object
            description: 'Other payment method.'
            properties:
              type:
                type: string
                description: |
                  Any other payment method.
                  
                  Location | Possible Value
                  ---|---
                  United Kingdom | simulation
                  
              provider:
                type: string
                nullable: true
                description: 'The provider of the this payment method.'
              provider_status:
                type: string
                nullable: true
                description: 'The status returned by the this payment method provider.'
              metadata:
                type: object
                additionalProperties: true
                description: 'Should the service provider return any supplementary free-form object data, it will be encapsulated within this metadata. This data is read-only and is not subject to alterations or modifications.'
      - type: object
        title: payid
        properties:
          payid:
            type: object
            description: 'PayID in Australia is a simplified payment system linking information like phone numbers or emails to bank accounts for easier, real-time transactions.'
            properties:
              npp_transaction_id:
                type: string
                description: 'The transaction ID used by the NPP platform.'
              payid:
                type: string
                description: 'The PayID used by your customer to make payment.'
              payid_type:
                type: string
                description: 'Type of the PayID.'
                enum:
                  - phone
                  - email
                  - abn
                  - org
              payer_payment_reference:
                type: string
                nullable: true
                description: 'The reference supplied by the payer when making the payment.'
              payer_payment_description:
                type: string
                nullable: true
                description: 'The description supplied by the payer when making the payment.'
      - type: object
        title: paynow
        properties:
          paynow:
            type: object
            description: 'PayNow is a peer-to-peer funds transfer service available in Singapore, allowing instant transfers in SGD between banks using mobile numbers, National Registration Identity Card, or Unique Entity Number.'
            properties:
              customer_name:
                type: string
                description: "Customer's Name."
      - type: object
        title: payto
        properties:
          payto:
            type: object
            description: |
              PayTo in Australia is a system allowing merchants to initiate real-time payments to either a PayID or a bank account, facilitating instant transfers.
            properties:
              npp_transaction_id:
                type: string
                description: 'The transaction ID used by the NPP platform.'
            oneOf:
            - type: object
              title: payer_payid
              properties:
                payer_payid:
                  type: object
                  description: ''
                  properties:
                    payid:
                      type: string
                      description: 'The PayID used by your customer to make payment.'
                    payid_type:
                      type: string
                      description: 'Type of the PayID.'
                      enum:
                        - phone
                        - email
                        - abn
                        - org
            - type: object
              title: payer_bank_account
              properties:
                payer_bank_account:
                  type: object
                  description: ''
                  properties:
                    bsb:
                      type: string
                      description: 'The BSB of the account number.'
                    account_number:
                      type: string
                      description: 'The Account Number (without the BSB).'
      - type: object
        title: promptpay
        properties:
          promptpay:
            type: object
            description: 'PromptPay is a money transfer service in Thailand, allowing users to transfer funds instantly using mobile numbers, national ID numbers, or QR codes, integrated with multiple Thai banks.'
            properties:
              type:
                type: string
                description: 'Payment Type.'
                enum:
                  - credit_transfer
                  - bill_payment
              value_date:
                type: integer
                description: 'Value Date in UNIX time format.'
              payer_bank_code:
                type: string
                description: 'Payer Bank Code.'
              credit_account:
                type: string
                description: 'Credit Account.'
              proxy:
                type: object
                description: ''
                properties:
                  id:
                    type: string
                    description: 'Proxy ID.'
                  type:
                    type: string
                    description: 'Proxy Type.'
                    enum:
                      - any_id
                      - biller_id
                      - settlement_account
                      - virtual_account
              channel:
                type: string
                description: 'Channel.'
                enum:
                  - kiosk
                  - edc_pos
                  - internet
                  - mobile
                  - others
              terminal_id:
                type: string
                nullable: true
                description: 'Terminal ID.'
              sqn:
                type: string
                nullable: true
                description: 'Sequence Number.'
              ref1:
                type: string
                nullable: true
                description: 'Reference #1.'
              ref2:
                type: string
                nullable: true
                description: 'Reference #2.'
              ref3:
                type: string
                nullable: true
                description: 'Reference #3.'
      - type: object
        title: qris
        properties:
          qris:
            type: object
            description: 'QRIS, or Quick Response Code Indonesian Standard, is a unified payment system in Indonesia, allowing users to make transactions using any QR code-based payment service across various platforms.'
            properties:
              issuer:
                type: string
                nullable: true
                description: 'Issuer name.'
              acquirer:
                type: string
                nullable: true
                description: 'Acquirer Name.'
              reference_id:
                type: string
                nullable: true
                description: 'Reference ID from Issuer.'
      - type: object
        title: upi
        properties:
          upi:
            type: object
            description: 'Unified Payments Interface (UPI) in India enables real-time payments via mobile, using a Virtual Payment Address (VPA) - a unique, user-created identifier, offering secure, simplified fund transfers.'
            properties:
              provider:
                type: string
                nullable: true
                description: |
                  The provider of the UPI service.
              payer_vpa:
                type: string
                nullable: true
                description: "A Payer's VPA (Virtual Payment Address) is a unique identifier created by the payer for initiating payments through India's UPI system."
              metadata:
                type: object
                additionalProperties: true
                description: 'Should the service provider return any supplementary free-form object data, it will be encapsulated within this metadata. This data is read-only and is not subject to alterations or modifications.'
      - type: object
        title: vietqr
        properties:
          vietqr:
            type: object
            description: "VietQR is Vietnam's standardized QR code for unified, secure, instant bank and payment transactions, enabling interoperable, real-time financial transfers and payments."
            properties:
              payment_code_type:
                type: string
                description: "To specify whether the payment's QR code is generated as dynamic or static."
                enum: 
                  - dynamic
                  - static
      - type: object
        title: wallet
        properties:
          wallet:
            type: object
            description: "A digital wallet is a software-based system for making electronic transactions, often linked to a user's bank account or credit card, used for online shopping, and mobile or contactless payments."
            properties:
              provider:
                type: string
                description: |
                  The provider of the digital wallet service.
                  
                  Location | Possible Value
                  ---|---
                  Hong Kong | payme
                  India | **Please reach out to the HSBC team to obtain the most up-to-date list*
                  Korea | alipay<br>kakaopay<br>l_pay<br>payco<br>sk_pay<br>wechat_pay
                  Malaysia | grab<br>mae<br>touch_n_go
                  Philippines | gcash<br>grabpay<br>instapay_qr<br>maya_wallet<br>qrph<br>shopeepay
                  Singapore | grabpay
                  Thailand | alipay<br>line_pay<br>samsung_pay<br>wechat_pay
                  United Kingdom | paypal<br>wechat_pay
                  United States | alipay<br>amazon_pay<br>cashapp<br>link<br>wechat_pay
                  Vietnam | **Please reach out to the HSBC team to obtain the most up-to-date list*
                  
              provider_status:
                type: string
                nullable: true
                description: 'The status returned by the digital wallet provider.'
              metadata:
                type: object
                additionalProperties: true
                description: 'Should the service provider return any supplementary free-form object data, it will be encapsulated within this metadata. This data is read-only and is not subject to alterations or modifications.'
    Refund:
      type: object
      properties:
        id:
          type: string
          description: 'Refund ID. Assigned by system.'
        entity:
          type: string
          description: 'Entity type.'
          enum: 
            - refund
        created:
          type: integer
          description: 'Time at which the entity is created. Measured in seconds since the Unix epoch.'
        amount:
          type: integer
          pattern: ^[\d]{1,10}$
          description: |
            *Input by User*<br>Refund amount.
        currency:
          type: string
          description: 'Three-letter ISO currency code, in lowercase.'
        reason:
          type: string
          minLength: 5
          maxLength: 140
          description: '*Input by User*<br>Reason of requesting this refund.'
        status:
          type: string
          description: |
            The status of the Refund.
            
            Status | Definition
            ---|---
            succeeded | The refund request has been successfully submitted.
            pending | The refund request has been successfully submitted and is now awaiting further action. This scenario is common in an asynchronous refund model.
            failed | The refund request has failed. The specific reason for the failure will be disclosed in the ```fail_reason``` field.
            rejected | The refund request has been rejected. The specific reason for the failure will be disclosed in the ```fail_reason``` field. This status is relevant only when a payment is initiated through a ```QR Code``` payment model.
          enum:
            - succeeded
            - pending
            - failed
            - rejected
        fail_reason:
          type: string
          nullable: true
          description: "The system returns a text message explaining the reason if a refund's status is failed."
        link:
          type: object
          description: 'Link to the related resource'
          properties:
            rel:
              type: string
              description: 'The related entity name of this entity'
              enum:
                - payment
            id:
              type: string
              description: 'The ID of the related entity'
        metadata:
            $ref: '#/components/schemas/Metadata'
    Metadata:
      type: object
      additionalProperties:
        type: string
      description: |
        *Input by User*<br>This parameter allows you to attach arbitrary key-value data to various entities. You can define up to 50 keys, with key names having a maximum length of 40 characters and values up to 500 characters.
        
        This is an example:
        ```
        "metadata": {
          "key_1": "value_1",
          "key_2": "value_2",
          "key_3": "value_3",
          ...
        }
        ```
    Error:
      type: object
      required:
        - type
        - code
        - message
        - time
      description: |
        There are two types of errors:
        
        Type | Definition
        ---|---
        api_gateway_error | Error occurred at HSBC API gateway. Code and Message are defined in the [Response Code Explanation](#apidoccontentid-2504) section.
        payment_gateway_error | Error occurred at payment gateway. The error code and message vary depending on the chosen Payment Model. Please contact the HSBC team for the most recent list of payment gateway errors.
        
      properties:
        type:
          type: string
          description: 'Type of the error.'
          enum:
            - api_gateway_error
            - payment_gateway_error
        code:
          type: string
          description: 'Reference code of the error.'
        message:
          type: string
          description: 'Text message of the error.'
        time:
          type: integer
          description: 'Time at which the error occurred. Measured in seconds since the Unix epoch.'