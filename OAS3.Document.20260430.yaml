                          description: '*Input by User*<br>A URL location to which the checkout process will redirect after completion.'
                        return_cancel_page:
                          type: string
                          maxLength: 255
                          description: '*Input by User*<br>A URL location to which the checkout process will redirect if it is cancelled by the customer. This field is applicable only when the "ui_mode" is set to "hosted".'  
                        webhook:
                          type: string
                          maxLength: 255
                          description: '*Input by User*<br>An internet-accessible URL capable of receiving payloads upon the occurrence of webhook events.<br>**Please see [Webhooks](#/Webhooks) for details.*'
                    page_setting:
                      type: object
                      description: ''
                      properties:
                        ui_mode:
                          type: string
                          description: |
                            *Input by User*<br>Specifies how the Hosted Payment Page is rendered. For integration guidance on different UI modes, please refer to the [Market-Specific Features](#apidoccontentid-2596) section.
                          
                            Mode | Definition
                            ---|---
                            hosted | The Hosted Payment Page is presented as a fully redirectable URL.
                            embedded | The Hosted Payment Page will be displayed as an embedded form on your website.
                            custom | The Hosted Payment Page will be displayed using embedded components on your website
                          
                          enum:
                            - hosted
                            - embedded
                            - custom
                        payment_option:
                          type: array
                          items:
                            type: string
                            enum:
                              - acss_debit
                              - affirm
                              - afterpay_clearpay
                              - alipay
                              - amazon_pay
                              - card
                              - cashapp
                              - klarna
                              - link
                              - wechat_pay
                          uniqueItems: true
                          description: '*Input by User*<br>Merchants can define which payment option will be exclusively displayed on the Hosted Page.'
                        expiry:
                          type: integer
                          pattern: ^[\d]{1,10}$
                          description: '*Input by User*<br>Sets a time constraint for the Checkout page. Upon reaching this specified time, the Checkout page will be inaccessible to the customer. Measured in seconds since the Unix epoch.'
                    capture_method:
                      type: string
                      default: auto
                      description: |
                        *Input by User*<br>Indicates the capture approach for the payment.
                        
                        Possible Values | Definitions 
                        ---|---
                        auto | Omni Collect automatically captures funds when the customer authorizes the payment.
                        manual | Place a hold on the funds when the customer authorizes the payment, but do not capture the funds until later.
                      enum: [auto, manual]
            - type: object
              title: us_sp_in_person_checkout
