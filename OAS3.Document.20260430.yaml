openapi: 3.0.0
info:
  version: '1.0a'
  title: Omni Single API
  description: 'Last Updated (2025-04-30)'
servers:
  - url: https://ws-api-platform.business.hsbc.com.hk/glcm-mobilecoll-mccon-ea-merchantservices-proxy/v1
    description: Production
  - url: https://ws-api-platform-pprd.business.hsbc.com.hk/glcm-mobilecoll-mccon-ea-merchantservices-proxy/v1
    description: Sandbox
tags:
  - name: Orders
    description: |
      An order is a checkout session that facilitates the receipt of payments. Each checkout session processes only a single payment. Once the status changes to ```paid``` or ```closed```, the checkout session accepts no further payment requests.
  - name: PayIDs
    description: |
      PayID is a real-time payment method used in Australia. A PayID allows users to link easy-to-remember pieces of information, such as their phone number or email address, to their account.
  - name: QR Codes
    description: |
      Generate a QR Code linked to a payment request, facilitated by one of the instant fund transfer systems.
  - name: Subscriptions
    description: |
      Subscription allows you to set up and manage recurring payments.
      
      *Not all Subscription Models support cancellation, suspension or resumption. For more details, please see the [Market-Specific Features](#apidoccontentid-2596) section.*
  - name: Subscription Amendments
    description: |
      Amend the recurring payment plan of a Subscription.
      
      *Not all Subscription Models support amendment. For more details, please see the [Market-Specific Features](#apidoccontentid-2596) section.*
  - name: Authorizations
    description: |
      Authorization represents a payment authorization, which allows you to reserve funds on a customer's payment method for a specific amount. Authorizations can support single or multiple captures.
  - name: Payments
    description: |
      Payments can be associated with entities ```ORDER```, ```PAYID```, ```QR_CODE```, ```AUTHORIZATION``` or ```SUBSCRIPTION```.
      
      *Different models offer varying payment cancellation capabilities.. For more details, please see the [Market-Specific Features](#apidoccontentid-2596) section.*
  - name: Refunds
    description: |
      You can issue a refund for a payment that has already been made. These refunds can be linked with the ```PAYMENT``` entity.
      
      *Different models offer varying refund capabilities. For more details, please see the [Market-Specific Features](#apidoccontentid-2596) section.*
  - name: Webhooks
    description: |
      ### EVENT-DRIVEN API
      An event-driven REST API is triggered by specific changes or events, instead of traditional explicit request calls to specific endpoints. This allows applications to respond instantly when designated events occur.
      
      ### URL CONFIGURATION
      To receive these callbacks, a URL must be established. This webhook URL can be defined within the ```ORDER```, ```SUBSCRIPTION```, ```PAYID```, or ```QR_CODE``` objects.
      
      Prior to use, the domain of the webhook URL must be registered within the HSBC system. For more information, please reach out to the HSBC team.
      
      The callback is sent using the HTTP POST method. It's essential that the client's exposed endpoint adheres to a security standard of TLS 1.2 or higher. Please note that the server certificate must be provided by a widely recognized commercial certificate authority; self-signed or internally signed certificates won't be accepted.
      
      ### HANDLING EXCEPTIONS
      Any event resulting in a non-2xx response is deemed an event delivery failure, triggering a retry mechanism. A maximum of 4 retries will occur, with each taking place every 2 minutes. This leads to a total of 5 calls, including the first attempt.
      
      ### IDEMPOTENCY
      There may be circumstances in which your endpoint receives the same webhook multiple times. This could occur due to expected behavior like the retry mechanism or unforeseen issues such as network problems.
      
      To manage these duplicate webhooks, we provide a unique webhook ID (referenced as ```x-hsbc-webhook-id``` in the HTTP header) with every webhook. This assists in identifying and processing repeat webhooks appropriately.
paths:
  /orders:
    post:
      tags:
        - Orders
      summary: Create an Order
      description: |
        To create an Order is essentially to create a Checkout Session. Depending on the selected Checkout Model, this session can either enable direct payment, or provide an HTML form, a URL link, or a Javascript codelet for accessing the Hosted Payment Page.
      parameters:
        - $ref: '#/components/parameters/order-x-hsbc-msg-encrypt-id'
        - $ref: '#/components/parameters/message_encrypt'
      requestBody:
        description: |
          ***The request body must be encrypted before sending. The unencrypted message shown below is merely for illustrative purposes.***
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - amount
                - currency
                - description
                - checkout_model
                - items
              properties:
                id:
                  type: string
                  minLength: 5
                  maxLength: 30
                  pattern: ^[a-zA-Z0-9_-]+$
                  description: 'Order ID. Assigned by User.'
                amount:
                  type: integer
                  pattern: ^[\d]{1,10}$
                  description: |
                    Order amount.
                    
                    - Input the amount as an integer without any punctuation. For example, if the amount is 19.45 in a currency that uses two decimal places, input it as 1945. If the currency does not use decimal places, enter the amount as is.
                    - Other specific rules, such as accepted amount ranges, may apply. Please refer to the [Market-Specific Features](#apidoccontentid-2596) section for details.
                currency:
                  type: string
                  pattern: ^[a-z]{3}$
                  description: |
                    Three-letter ISO currency code, in lowercase.
                  
                    - Supported currencies may vary among different locations and models. Please refer to the [Market-Specific Features](#apidoccontentid-2596) section for details.
                description:
                  type: string
                  minLength: 5
                  maxLength: 140
                  description: 'Description of this Order.'
                checkout_model:
                  type: object
                  description: |
                    Checkout Model.
                    
                    Model | Definition
                    ---|---
                    au_fs_hosted_checkout | Australia FS Hosted Checkout
                    bd_sl_hosted_checkout | Bangladesh SL Hosted Checkout
                    hk_hsbc_payme | Hong Kong HSBC PayMe
                    id_jk_hosted_checkout | Indonesia JK Hosted Checkout
                    in_hsbc_upi_checkout | India HSBC UPI Checkout
                    in_pu_hosted_checkout | India PU Hosted Checkout
                    in_rp_overlay_hosted_checkout | India RP Overlay Hosted Checkout
                    in_rp_redirect_hosted_checkout | India RP Redirect Hosted Checkout
                    jp_sn_hosted_checkout | Japan SN Hosted Checkout
                    jp_sn_direct_checkout | Japan SN Direct Checkout
                    kr_fs_hosted_checkout | Korea FS Hosted Checkout
                    my_eg_hosted_checkout | Malaysia EG Hosted Checkout
                    ph_rz_hosted_checkout | Philippines RZ Hosted Checkout
                    sg_fs_hosted_checkout | Singapore FS Hosted Checkout
                    th_cp_hosted_checkout | Thailand CP Hosted Checkout
                    ae_gd_hosted_checkout | United Arab Emirates GD Hosted Checkout
                    uk_gp_direct_checkout | United Kingdom GP Direct Checkout
                    uk_gp_hosted_checkout | United Kingdom GP Hosted Checkout
                    uk_gp_open_banking | United Kingdom GP Open Banking
                    uk_hsbc_open_banking | United Kingdom HSBC Open Banking
                    us_sp_hosted_checkout | United States SP Hosted Checkout
                    us_sp_in_person_checkout | United States SP In-Person Checkout
                    vn_py_hosted_checkout | Vietnam PY Hosted Checkout
                    
                  oneOf:
                    - type: object
                      title: au_fs_hosted_checkout
                      properties:
                        au_fs_hosted_checkout:
                          required:
                            - url_setting
                          type: object
                          description: ''
                          properties:
                            url_setting:
                              required:
                                - return_success_page
                                - return_fail_page
                                - webhook
                              type: object
                              description: 'Important Reminder: Ensure all values in the URL are properly URL-encoded.'
                              properties:
                                return_success_page:
                                  type: string
                                  maxLength: 255
                                  description: 'A URL location to which the checkout process will redirect after successful completion.'
                                return_fail_page:
                                  type: string
                                  maxLength: 255
                                  description: 'A URL location to which the checkout process will redirect if it fails.'  
                                webhook:
                                  type: string
                                  maxLength: 255
                                  description: 'An internet-accessible URL capable of receiving payloads upon the occurrence of webhook events.<br>**Please see [Webhooks](#/Webhooks) for details.*'
                            page_setting:
                              type: object
                              description: ''
                              properties:
                                payment_option:
                                  type: string
                                  description: 'Merchants can define which payment option will be exclusively displayed on the Hosted Page.'
                                  enum:
                                    - amex
                                    - diners
                                    - mastercard
                                    - unionpay
                                    - visa
                            payment_method_setting:
                              type: object
                              description: ''
                              properties:
                                card:
                                  type: object
                                  description: ''
                                  properties:
                                    tokenization:
                                      type: object
                                      description: |
                                        Card details can be tokenized. Here is the supported type of tokenization:
                                        
                                        Type | Definition
                                        ---|---
                                        Merchant-assigned Token | When initiating a new Checkout Session, merchants can assign a unique string token. This token is linked to the card details and securely stored in the payment gateway after a successful checkout. In subsequent Checkout Sessions, using this same token will activate the auto-fill functionality for the associated card details on the Hosted Checkout Page.
                                      properties:
                                        type:
                                          type: string
                                          description: 'Type of card tokenization'
                                          enum:
                                            - merchant_assigned_token
                                        token:
                                          type: string
                                          maxLength: 50
                                          description: 'A unique string token assigned by the Merchant.'
                    - type: object
                      title: bd_sl_hosted_checkout
