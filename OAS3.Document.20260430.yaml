                            page_setting:
                              required:
                                - expiry
                              type: object
                              description: ''
                              properties:
                                expiry:
                                  type: integer
                                  pattern: ^[\d]{1,10}$
                                  description: 'Sets a time constraint for the Checkout page. Upon reaching this specified time, the Checkout page will be inaccessible to the customer. Measured in seconds since the Unix epoch. The minimum timespan is 15 seconds and the maximum timespan is 7 days.'
                    - type: object
                      title: id_jk_hosted_checkout
                      properties:
                        id_jk_hosted_checkout:
                          required:
                            - url_setting
                            - page_setting
                            - customer
                          type: object
                          description: ''
                          properties:
                            url_setting:
                              required:
                                - return_page
                                - return_cancel_page
                                - webhook
                              type: object
                              description: 'Important Reminder: Ensure all values in the URL are properly URL-encoded.'
                              properties:
                                return_page:
                                  type: string
                                  maxLength: 255
                                  description: 'A URL location to which the checkout process will redirect after completion.'
                                return_cancel_page:
                                  type: string
                                  maxLength: 255
                                  description: 'A URL location to which the checkout process will redirect if it is cancelled by the customer.'
                                iframe_return_page:
                                  type: string
                                  maxLength: 255
                                  description: 'A URL location to which the checkout process will redirect if the hosted payment page is embedded within an iframe.'
                                webhook:
                                  type: string
                                  maxLength: 255
                                  description: 'An internet-accessible URL capable of receiving payloads upon the occurrence of webhook events.<br>**Please see [Webhooks](#/Webhooks) for details.*'
                            page_setting:
                              required:
                                - retry_payment
                                - expiry
                                - lang
                              type: object
                              description: ''
                              properties:
                                payment_option:
                                  type: array
                                  items:
                                    type: string
                                    enum:
                                      - credit_card
                                      - direct_debit_bri
                                      - direct_debit_cimb
                                      - emoney_doku
                                      - emoney_ovo
                                      - emoney_shopee_pay
                                      - jenius_pay
                                      - online_to_offline_alfa
                                      - peer_to_peer_akulaku
                                      - peer_to_peer_indodana
                                      - peer_to_peer_kredivo
                                      - qris
                                      - virtual_account_bank_mandiri
                                      - virtual_account_bank_syariah_mandiri
                                      - virtual_account_bca
                                      - virtual_account_bni
                                      - virtual_account_bri
                                      - virtual_account_cimb
                                      - virtual_account_danamon
                                      - virtual_account_doku
                                      - virtual_account_permat
                                  uniqueItems: true
                                  description: 'Merchants can define which payment option will be exclusively displayed on the Hosted Page.'
                                installment_tenor_option:
                                  type: array
                                  items:
                                    type: integer
                                    enum:
                                      - 0
                                      - 3
                                      - 6
                                      - 12
                                  uniqueItems: true
                                  description: 'Merchants can define the specific installment tenor to be exclusively displayed on the installment option list. Inputting ```0``` will lead to the "no installment" option being displayed in the list.'
                                retry_payment:
                                  type: boolean
                                  description: 'Set this to ```true``` to display the result page in Checkout, allowing the customer to retry payment or switch payment options (if multiple channel options are available). This is applicable for Credit Card, DOKU Wallet, Akulaku, OVO, and ShopeePay.'
                                expiry:
                                  type: integer
                                  pattern: ^[\d]{1,10}$
                                  description: 'Sets a time constraint for the Checkout page. Upon reaching this specified time, the Checkout page will be inaccessible to the customer. Measured in seconds since the Unix epoch.'
                                lang:
                                  type: string
                                  description: |
                                    To specify payment page localization.
                                    
                                    Language Code | Definition
                                    --- | ---
                                    en | English
                                    id | Bahasa Indonesia
                                    
                                  enum:
                                  - en
                                  - id
                            payment_method_setting:
                              type: object
                              description: ''
                              properties:
                                card:
                                  type: object
                                  description: ''
                                  properties:
                                    tokenization:
                                      type: object
                                      description: |
                                        Card details can be tokenized. Here is the supported type of tokenization:
                                        
                                        Type | Definition
                                        ---|---
                                        System-assigned Token | When customers opt for the 'save card' feature during the checkout process on the hosted payment page, the payment gateway creates a token. This token, associated with the card details, is securely stored after a successful checkout and is returned in the payment callbacks. In subsequent Checkout Sessions, using this same token will activate the auto-fill functionality for the associated card details on the Hosted Checkout Page.
