  /payids:
    post:
      tags:
        - PayIDs
      summary: Create a PayID
      description: |
        Creates a PayID to receive payment.
      parameters:
        - $ref: '#/components/parameters/payid-x-hsbc-msg-encrypt-id'
        - $ref: '#/components/parameters/message_encrypt'
      requestBody:
        description: |
          ***The request body must be encrypted before sending. The unencrypted message shown below is merely for illustrative purposes.***
        content:
          application/json:
            schema:
              required:
                - id
                - currency
                - description
                - url_setting
                - payid_customisation
                - payment_model
              type: object
              properties:
                id:
                  type: string
                  minLength: 5
                  maxLength: 30
                  pattern: ^[a-zA-Z0-9_-]+$
                  description: 'PayID ID. Assigned by User.'
                currency:
                  type: string
                  pattern: ^[a-z]{3}$
                  description: |
                    Three-letter ISO currency code, in lowercase.
                  
                    - Supported currencies may vary among different locations and models. Please refer to the [Market-Specific Features](#apidoccontentid-2596) section for details.
                description:
                  type: string
                  minLength: 5
                  maxLength: 140
                  description: 'Description of this PayID.'
                payid_expiry:
                  type: integer
                  pattern: ^[\d]{1,10}$
                  description: 'Time when the payment request expires and is no longer able to accept payments. The associated PayID is also de-registered within 48 hours of the specified time. Measured in seconds since the Unix epoch.'  
                url_setting:
                  required:
                    - webhook
                  type: object
                  description: 'Important Reminder: Ensure all values in the URL are properly URL-encoded.'
                  properties:
                    webhook:
                      type: string
                      maxLength: 255
                      description: 'An internet-accessible URL capable of receiving payloads upon the occurrence of webhook events.<br>**Please see [Webhooks](#/Webhooks) for details.*'
                payid_customisation:
                  type: object
                  description: |
                    Several methods are available for customising an email PayID. Choose one of them at a time.
            
                    Method | Definition
                    ---|---
                    merchant_assigned | The PayID value is assigned by the Merchant.
                    system_assigned | The PayID value is assigned by the Payment Gateway.
                    system_assigned_with_specific_domain | The PayID value is assigned by the Payment Gateway, while the Merchant has the flexibility to specify the email domain.
                    
                  oneOf:
                    - type: object
                      title: merchant_assigned
                      properties:
                        merchant_assigned:
                          required:
                            - email
                          type: object
                          properties:
                            email:
                              type: string
                              minLength: 5
                              maxLength: 50
                              pattern: ^([a-z0-9_\-\.]+)@([a-z0-9_\-\.]+)\.([a-z]+)$
                              description: "Allocate a unique email to serve as the PayID value. Ensure that the domain of the PayID aligns with one of the domains configured for the client."
                    - type: object
                      title: system_assigned
                      properties:
                        system_assigned:
                          type: object
                          description: 'No more input is needed.'
                    - type: object
                      title: system_assigned_with_specific_domain
                      properties:
                        system_assigned_with_specific_domain:
                          required:
                            - domain
                          type: object
                          properties:
                            domain:
                              type: string
                              minLength: 5
                              maxLength: 50
                              pattern: ^([a-z0-9_\-\.]+)\.([a-z]+)$
                              description: "Specify the email domain to be used during PayID generation. All domains must undergo validation and preconfiguration prior to use. An error is returned if a non-configured value is supplied."
                payment_model:
                  type: object
                  description: |
                    A PayID can be configured to receive either a single payment or multiple payments.
                    
                    Model | Definition
                    ---|---
                    single | Configured to accept only a single payment, the PayID will be de-registered upon completion. The payment amount must match the PayID amount; any discrepancy will result in an error.
                    multiple | Multiple payments can be made by customers to a single PayID, with no restrictions on the payment amount. In this configuration, the PayID status remains perpetually in the ```waiting``` state.
                    multiple_with_max_amount | Customers are allowed to make multiple payments to a single PayID. However, the total of all payments should not exceed the specified PayID amount.
                    
                  oneOf:
                    - type: object
                      title: single
                      properties:
                        single:
                          required:
                            - amount
                          type: object
                          properties:
                            amount:
                              type: integer
                              pattern: ^[\d]{1,10}$
                              description: |
                                The PayID amount.
                                - Input the amount as an integer without any punctuation. For example, if the amount is 19.45 in a currency that uses two decimal places, input it as 1945. If the currency does not use decimal places, enter the amount as is.
                                - Other specific rules, such as accepted amount ranges, may apply. Please refer to the [Market-Specific Features](#apidoccontentid-2596) section for details.
                    - type: object
                      title: multiple
                      properties:
                        multiple:
                          type: object
                          description: 'No more input is needed.'
                    - type: object
                      title: multiple_with_max_amount
                      properties:
                        multiple_with_max_amount:
                          required:
                            - amount
                          type: object
                          properties:
                            amount:
                              type: integer
                              pattern: ^[\d]{1,10}$
                              description: |
                                The PayID amount.
                                - Input the amount as an integer without any punctuation. For example, if the amount is 19.45 in a currency that uses two decimal places, input it as 1945. If the currency does not use decimal places, enter the amount as is.
                                - Other specific rules, such as accepted amount ranges, may apply. Please refer to the [Market-Specific Features](#apidoccontentid-2596) section for details.
                metadata:
                  $ref: '#/components/schemas/Metadata'
            example:
              id: payid-1234
              description: Payment for hotel room one night
              currency: aud
              payid_expiry: 1661517573
              url_setting:
                webhook: https%3A%2F%2Fwww.example.com%2Fcallback
              payid_customisation:
                system_assigned_with_specific_domain:
                  domain: domain.com
              payment_model:
                single:
                  amount: 50000
              metadata:
                any_key: any_value
        required: true
      responses:
        '200':
          $ref: '#/components/responses/payid_200'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
        '599':
          $ref: '#/components/responses/599'
      security:
        - basicAuth: []
